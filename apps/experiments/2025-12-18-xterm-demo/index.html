<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xterm.js PTY Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0d1117;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .title {
      color: #c9d1d9;
      font-family: system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f85149;
    }
    .status-dot.connected {
      background: #3fb950;
    }
    .size-indicator {
      margin-left: auto;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: #6e7681;
    }
    #terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
    }
    .xterm {
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Terminal</span>
    <span class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </span>
    <span class="size-indicator" id="size-indicator">80x24</span>
  </div>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: 'bar',
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#58a6ff',
        cursorAccent: '#0d1117',
        selectionBackground: '#264f78',
        selectionForeground: '#ffffff',
        black: '#484f58',
        red: '#ff7b72',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39c5cf',
        white: '#b1bac4',
        brightBlack: '#6e7681',
        brightRed: '#ffa198',
        brightGreen: '#56d364',
        brightYellow: '#e3b341',
        brightBlue: '#79c0ff',
        brightMagenta: '#d2a8ff',
        brightCyan: '#56d4dd',
        brightWhite: '#f0f6fc',
      },
      fontSize: 14,
      fontFamily: '"JetBrains Mono", "Fira Code", Menlo, Monaco, monospace',
      fontWeight: '400',
      letterSpacing: 0,
      lineHeight: 1.2,
      scrollback: 10_000,
      allowProposedApi: true,
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();

    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);

    const container = document.getElementById('terminal-container');
    term.open(container);

    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const sizeIndicator = document.getElementById('size-indicator');

    let ws = null;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    let hasReceivedOutput = false;

    function updateSize() {
      fitAddon.fit();
      sizeIndicator.textContent = `${term.cols}x${term.rows}`;

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'resize',
          cols: term.cols,
          rows: term.rows,
        }));
      }
    }

    function setStatus(connected, text) {
      statusDot.classList.toggle('connected', connected);
      statusText.textContent = text;
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => {
        setStatus(true, 'Connected');
        reconnectAttempts = 0;
        hasReceivedOutput = false;
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case 'output':
              term.write(msg.data);
              if (!hasReceivedOutput) {
                hasReceivedOutput = true;
                setTimeout(updateSize, 100);
              }
              break;
            case 'exit':
              term.writeln(`\r\n\x1b[33m[Process exited with code ${msg.exitCode}]\x1b[0m`);
              setStatus(false, 'Exited');
              break;
          }
        } catch (e) {
          console.error('Failed to parse message:', e);
        }
      };

      ws.onclose = () => {
        setStatus(false, 'Disconnected');

        if (reconnectAttempts < maxReconnectAttempts) {
          reconnectAttempts++;
          const delay = Math.min(1000 * 2 ** (reconnectAttempts - 1), 10_000);
          setStatus(false, `Reconnecting (${reconnectAttempts}/${maxReconnectAttempts})...`);
          setTimeout(connect, delay);
        } else {
          term.writeln('\r\n\x1b[31m[Connection lost. Refresh to reconnect.]\x1b[0m');
        }
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
    }

    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    term.onResize(({ cols, rows }) => {
      sizeIndicator.textContent = `${cols}x${rows}`;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    });

    let resizeTimeout;
    const resizeObserver = new ResizeObserver(() => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(updateSize, 50);
    });
    resizeObserver.observe(container);

    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(updateSize, 50);
    });

    updateSize();
    connect();
    term.focus();

    document.addEventListener('click', () => term.focus());
  </script>
</body>
</html>
