<!DOCTYPE html>
<html>
<head>
	<title>Streaming Transcription Test</title>
	<style>
		body { font-family: monospace; background: #111; color: #0f0; padding: 2rem; }
		button { font-size: 1.5rem; padding: 1rem 2rem; cursor: pointer; }
		#output { margin-top: 2rem; padding: 1rem; border: 1px solid #0f0; min-height: 100px; white-space: pre-wrap; }
		.recording { background: #f00; color: #fff; }
	</style>
</head>
<body>
	<button id="btn">Click to Record</button>
	<div id="output"></div>
	<script>
		const btn = document.getElementById('btn');
		const output = document.getElementById('output');
		let mediaRecorder, chunks = [];

		btn.onclick = async () => {
			if (mediaRecorder?.state === 'recording') {
				mediaRecorder.stop();
				return;
			}
			chunks = [];
			output.textContent = '';
			const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
			mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
			mediaRecorder.ondataavailable = e => chunks.push(e.data);
			mediaRecorder.onstop = async () => {
				stream.getTracks().forEach(t => t.stop());
				btn.textContent = 'Processing...';
				btn.disabled = true;

				const blob = new Blob(chunks, { type: 'audio/webm' });
				const form = new FormData();
				form.append('audio', blob);

				const res = await fetch('/transcribe', { body: form, method: 'POST' });
				const reader = res.body.getReader();
				const decoder = new TextDecoder();

				while (true) {
					const { done, value } = await reader.read();
					if (done) break;
					output.textContent += decoder.decode(value);
				}

				btn.textContent = 'Click to Record';
				btn.disabled = false;
				btn.classList.remove('recording');
			};
			mediaRecorder.start();
			btn.textContent = 'Recording... Click to Stop';
			btn.classList.add('recording');
		};
	</script>
</body>
</html>
